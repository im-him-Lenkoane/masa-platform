<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — M@SA</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .offline-page { min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px; }
    .offline-icon { font-size:4rem;margin-bottom:24px; }
    h1 { font-family:var(--font-display);font-size:1.6rem;margin-bottom:12px; }
    p { color:var(--grey-light);max-width:400px;line-height:1.7;margin-bottom:8px; }
  </style>
</head>
<body>
<div class="offline-page">
  <div class="offline-icon">📶</div>
  <h1>You're Offline</h1>
  <p>This page hasn't been downloaded for offline use yet.</p>
  <p>To study offline, visit a subject page while online and tap <strong>"Download Subject"</strong> when prompted.</p>
  <button class="btn btn-primary" style="margin-top:24px" onclick="window.location.reload()">Try Again</button>
  <button class="btn btn-ghost" style="margin-top:12px" onclick="window.location.href='/'">Go Home</button>
</div>
</body>
</html>
