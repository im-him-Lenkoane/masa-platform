<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Room — M@SA</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    body{overflow:hidden}
    .room-layout{display:grid;grid-template-columns:1fr 320px;height:calc(100vh - var(--header-h));overflow:hidden}
    .room-main{display:flex;flex-direction:column;overflow:hidden;background:#050d1a}
    .room-header{padding:12px 20px;background:var(--navy-mid);border-bottom:1px solid rgba(79,195,247,0.12);display:flex;align-items:center;gap:12px;flex-shrink:0}
    .room-title{font-size:0.9rem;font-weight:700;color:var(--white);flex:1}
    .room-status{font-family:var(--font-mono);font-size:0.65rem;padding:4px 10px;border-radius:10px}
    .status-live{background:rgba(76,175,80,0.2);color:#4caf50;border:1px solid rgba(76,175,80,0.3)}
    .status-scheduled{background:rgba(79,195,247,0.1);color:var(--light-blue);border:1px solid rgba(79,195,247,0.2)}
    .video-area{flex:1;position:relative;overflow:hidden}
    #jitsi-frame{width:100%;height:100%;border:none}
    .entry-gate{position:absolute;inset:0;background:#050d1a;display:flex;align-items:center;justify-content:center;z-index:10}
    .gate-box{background:var(--navy-mid);border:1px solid rgba(79,195,247,0.2);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:400px;text-align:center}
    .gate-icon{font-size:2.5rem;margin-bottom:16px}
    .gate-box h2{font-size:1.1rem;margin-bottom:8px}
    .gate-box p{font-size:0.82rem;color:var(--grey-light);margin-bottom:20px}
    .room-sidebar{display:flex;flex-direction:column;background:var(--navy-mid);border-left:1px solid rgba(79,195,247,0.1);overflow:hidden}
    .sidebar-tabs{display:flex;border-bottom:1px solid rgba(79,195,247,0.1)}
    .stab{flex:1;padding:12px;text-align:center;font-size:0.75rem;cursor:pointer;color:var(--grey-light);border-bottom:2px solid transparent;transition:all var(--transition)}
    .stab.active{color:var(--light-blue);border-bottom-color:var(--light-blue)}
    .tab-panel{display:none;flex:1;overflow-y:auto;flex-direction:column}
    .tab-panel.active{display:flex}
    .chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
    .chat-msg{background:rgba(79,195,247,0.06);border-radius:var(--radius);padding:8px 10px}
    .chat-msg-admin{background:rgba(245,200,66,0.08);border-left:2px solid var(--gold)}
    .chat-name{font-size:0.68rem;font-weight:700;color:var(--light-blue);margin-bottom:2px}
    .chat-name-admin{color:var(--gold)}
    .chat-text{font-size:0.8rem;color:var(--white-dim);line-height:1.5;word-break:break-word}
    .chat-time{font-size:0.62rem;color:var(--grey-mid);margin-top:3px}
    .chat-input-area{padding:10px;border-top:1px solid rgba(79,195,247,0.1);display:flex;gap:6px}
    .chat-input-area input{flex:1;font-size:0.8rem;padding:8px 10px}
    .chat-input-area button{padding:8px 12px;font-size:0.78rem}
    .info-panel{padding:16px;overflow-y:auto}
    .info-row{margin-bottom:12px}
    .info-label{font-family:var(--font-mono);font-size:0.62rem;color:var(--grey-mid);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
    .info-value{font-size:0.82rem;color:var(--white-dim)}
    @media(max-width:768px){
      body{overflow:auto}
      .room-layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
      .room-sidebar{height:300px}
    }
  </style>
</head>
<body>
<header id="site-header" style="flex-shrink:0">
  <a class="logo-link" href="/"><div class="logo-mark" id="site-logo-mark">M@SA</div>
    <div class="logo-text"><span class="logo-main">M@SA</span><span class="logo-sub">Messelaar @ STEM Academy NPC</span></div>
  </a>
  <div class="header-spacer"></div>
  <a href="/sessions.html" class="btn btn-ghost btn-sm">← All Sessions</a>
</header>

<div class="room-layout">
  <!-- Main Video Area -->
  <div class="room-main">
    <div class="room-header">
      <div class="room-title" id="room-title">Loading session...</div>
      <span class="room-status" id="room-status-badge"></span>
    </div>
    <div class="video-area">
      <!-- Entry Gate -->
      <div class="entry-gate" id="entry-gate">
        <div class="gate-box">
          <div class="gate-icon" id="gate-icon">🔐</div>
          <h2 id="gate-title">Join Session</h2>
          <p id="gate-desc">Loading...</p>
          <div id="gate-form"></div>
        </div>
      </div>
      <!-- Jitsi iframe (hidden until admitted) -->
      <iframe id="jitsi-frame" allow="camera;microphone;fullscreen;display-capture" style="display:none"></iframe>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="room-sidebar">
    <div class="sidebar-tabs">
      <div class="stab active" onclick="switchTab('chat',this)">💬 Chat</div>
      <div class="stab" onclick="switchTab('info',this)">ℹ️ Info</div>
    </div>

    <!-- Chat Panel -->
    <div class="tab-panel active" id="tab-chat">
      <div class="chat-messages" id="chat-messages">
        <div style="text-align:center;padding:20px;font-size:0.78rem;color:var(--grey-mid)">Chat loads when you join.</div>
      </div>
      <div class="chat-input-area" id="chat-input-area" style="display:none">
        <input type="text" id="chat-input" placeholder="Type a message..." maxlength="500"
               onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn btn-primary" onclick="sendChat()">→</button>
      </div>
    </div>

    <!-- Info Panel -->
    <div class="tab-panel" id="tab-info">
      <div class="info-panel" id="session-info-panel">
        <div class="loading-state" style="padding:20px"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
'use strict';
var sessionData   = null;
var displayName   = 'Student';
var chatInterval  = null;
var sessionId     = new URLSearchParams(window.location.search).get('id');

document.addEventListener('DOMContentLoaded', async function() {
  await loadSiteLogo();
  if (!sessionId) { window.location.href = '/sessions.html'; return; }
  await loadSessionData();
});

async function loadSessionData() {
  try {
    sessionData = await apiFetch('/api/sessions/' + sessionId);
    document.getElementById('room-title').textContent = sessionData.title;
    var badge = document.getElementById('room-status-badge');
    if (sessionData.status === 'live') {
      badge.textContent = '🔴 LIVE'; badge.className = 'room-status status-live';
    } else {
      badge.textContent = sessionData.status.toUpperCase(); badge.className = 'room-status status-scheduled';
    }
    renderInfoPanel();
    renderGate();
  } catch(e) {
    document.getElementById('gate-title').textContent = 'Session Not Found';
    document.getElementById('gate-desc').textContent = e.message;
  }
}

function renderInfoPanel() {
  var s = sessionData;
  var start = new Date(s.scheduled_start);
  var end   = s.scheduled_end ? new Date(s.scheduled_end) : null;
  document.getElementById('session-info-panel').innerHTML =
    '<div class="info-row"><div class="info-label">Session</div><div class="info-value">'+escHtml(s.title)+'</div></div>'
    +'<div class="info-row"><div class="info-label">Type</div><div class="info-value">'+escHtml(s.session_type)+' / '+escHtml(s.access_type.replace('_',' '))+'</div></div>'
    +'<div class="info-row"><div class="info-label">Date</div><div class="info-value">'+start.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div></div>'
    +'<div class="info-row"><div class="info-label">Time</div><div class="info-value">'+start.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})+(end?' – '+end.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'}):'')+'</div></div>'
    +(s.host_name?'<div class="info-row"><div class="info-label">Host</div><div class="info-value">'+escHtml(s.host_name)+'</div></div>':'')
    +(s.confirmed_count?'<div class="info-row"><div class="info-label">Registered</div><div class="info-value">'+s.confirmed_count+' participants</div></div>':'')
    +(s.description?'<div class="info-row"><div class="info-label">About</div><div class="info-value">'+escHtml(s.description)+'</div></div>':'');
}

function renderGate() {
  var s = sessionData;
  var gateIcon  = document.getElementById('gate-icon');
  var gateTitle = document.getElementById('gate-title');
  var gateDesc  = document.getElementById('gate-desc');
  var gateForm  = document.getElementById('gate-form');

  if (s.status === 'ended') {
    gateIcon.textContent  = '✅';
    gateTitle.textContent = 'Session Ended';
    gateDesc.textContent  = 'This session has ended. Thank you for participating!';
    gateForm.innerHTML    = '<a href="/sessions.html" class="btn btn-ghost">View Other Sessions</a>';
    return;
  }
  if (s.status === 'scheduled' && s.session_type !== 'online') {
    gateIcon.textContent  = '📍';
    gateTitle.textContent = 'In-Person Session';
    gateDesc.textContent  = 'This is an in-person session. Attend at the venue with your Class ID.';
    gateForm.innerHTML    = '<a href="/sessions.html" class="btn btn-ghost">Back to Sessions</a>';
    return;
  }
  if (s.status !== 'live') {
    var start = new Date(s.scheduled_start);
    gateIcon.textContent  = '🕐';
    gateTitle.textContent = 'Session Not Started Yet';
    gateDesc.textContent  = 'This session starts on ' + start.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'}) + ' at ' + start.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'}) + '. Come back then.';
    gateForm.innerHTML    = '<a href="/sessions.html" class="btn btn-ghost">Back to Sessions</a>';
    return;
  }

  // Session is live — show entry form
  if (s.access_type === 'free_open' && !s.is_locked) {
    gateIcon.textContent  = '🔓';
    gateTitle.textContent = 'Join ' + s.title;
    gateDesc.textContent  = 'Enter your display name to join this free session.';
    gateForm.innerHTML    =
      '<div class="form-group"><input type="text" id="guest-name" placeholder="Your name" style="text-align:center"></div>'
      +'<button class="btn btn-primary btn-full" onclick="joinFreeOpen()">Join Session →</button>';
  } else {
    gateIcon.textContent  = s.access_type === 'paid' ? '💳' : '🔒';
    gateTitle.textContent = s.access_type === 'paid' ? 'Paid Session' : 'Password Protected';
    gateDesc.textContent  = s.access_type === 'paid'
      ? 'Enter your Class ID to join. This is the ID you received when you registered and paid.'
      : 'Enter the session password to join.';
    gateForm.innerHTML    =
      '<div class="form-group"><input type="text" id="class-id-input" placeholder="Enter Class ID / Password" style="text-align:center;letter-spacing:0.05em;font-family:var(--font-mono)"></div>'
      +'<button class="btn btn-primary btn-full" onclick="verifyEntry()">Enter Session →</button>'
      +(s.access_type==='paid'?'<p style="font-size:0.72rem;color:var(--grey-mid);margin-top:10px">Don\'t have a Class ID? <a href="/register-session.html?id='+s.id+'" style="color:var(--light-blue)">Register here</a></p>':'');
  }
}

async function joinFreeOpen() {
  var name = (document.getElementById('guest-name')||{}).value;
  displayName = (name && name.trim()) ? name.trim() : 'Guest';
  admitToSession(sessionData.jitsi_room_name);
}

async function verifyEntry() {
  var classId = document.getElementById('class-id-input').value.trim();
  if (!classId) { showToast('Please enter your Class ID.', 'error'); return; }
  try {
    var btn = document.querySelector('#gate-form .btn-primary');
    btn.textContent = 'Verifying...'; btn.disabled = true;
    var result = await apiFetch('/api/sessions/' + sessionId + '/verify-entry', {
      method: 'POST', body: { class_id: classId }
    });
    if (result.admitted) {
      displayName = result.display_name || 'Student';
      admitToSession(result.jitsi_room);
    }
  } catch(e) {
    showToast(e.message, 'error');
    var btn = document.querySelector('#gate-form .btn-primary');
    if (btn) { btn.textContent = 'Enter Session →'; btn.disabled = false; }
  }
}

function admitToSession(jitsiRoom) {
  document.getElementById('entry-gate').style.display = 'none';
  var frame = document.getElementById('jitsi-frame');
  frame.style.display = 'block';
  frame.src = 'https://meet.jit.si/' + encodeURIComponent(jitsiRoom)
    + '#userInfo.displayName="' + encodeURIComponent(displayName) + '"'
    + '&config.prejoinPageEnabled=false'
    + '&config.startWithAudioMuted=true'
    + '&interfaceConfig.SHOW_JITSI_WATERMARK=false'
    + '&interfaceConfig.SHOW_BRAND_WATERMARK=false';
  document.getElementById('chat-input-area').style.display = 'flex';
  loadChat();
  chatInterval = setInterval(loadChat, 5000);
  showToast('Welcome to the session, ' + displayName + '!', 'success');
}

async function loadChat() {
  try {
    var msgs = await apiFetch('/api/sessions/' + sessionId + '/chat');
    var container = document.getElementById('chat-messages');
    var wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
    container.innerHTML = msgs.length
      ? msgs.map(function(m) {
          return '<div class="chat-msg' + (m.is_admin?' chat-msg-admin':'') + '">'
            +'<div class="chat-name' + (m.is_admin?' chat-name-admin':'') + '">'
            +escHtml(m.sender_name)+(m.is_admin?' 👑':'')+'</div>'
            +'<div class="chat-text">'+escHtml(m.message)+'</div>'
            +'<div class="chat-time">'+new Date(m.created_at).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})+'</div>'
            +'</div>';
        }).join('')
      : '<div style="text-align:center;padding:20px;font-size:0.78rem;color:var(--grey-mid)">No messages yet. Say hello!</div>';
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  } catch(e) {}
}

async function sendChat() {
  var input = document.getElementById('chat-input');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  try {
    await apiFetch('/api/sessions/' + sessionId + '/chat', {
      method: 'POST', body: { sender_name: displayName, message: msg }
    });
    await loadChat();
  } catch(e) { showToast('Could not send message.', 'error'); }
}

function switchTab(name, btn) {
  document.querySelectorAll('.stab').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}
</script>
</body>
</html>
