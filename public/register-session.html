<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register for Session — M@SA</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .reg-wrap{max-width:560px;margin:0 auto;padding:40px 16px}
    .success-box{background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);border-radius:var(--radius-lg);padding:28px;text-align:center}
    .class-id-display{font-family:var(--font-mono);font-size:1.4rem;letter-spacing:0.12em;color:var(--gold);background:rgba(245,200,66,0.08);border:2px solid var(--gold);border-radius:var(--radius);padding:16px 24px;margin:16px 0;word-break:break-all}
    .payment-box{background:var(--navy-mid);border:1px solid rgba(79,195,247,0.15);border-radius:var(--radius-lg);padding:20px;margin-top:16px;text-align:left}
    .payment-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(79,195,247,0.07)}
    .payment-row:last-child{border-bottom:none}
    .payment-label{font-size:0.75rem;color:var(--grey-light)}
    .payment-value{font-size:0.85rem;color:var(--white);font-weight:600;font-family:var(--font-mono)}
    .ref-highlight{background:rgba(245,200,66,0.15);border:1px solid rgba(245,200,66,0.4);border-radius:var(--radius);padding:4px 8px;color:var(--gold)}
    .warning-box{background:rgba(255,160,0,0.1);border:1px solid rgba(255,160,0,0.3);border-radius:var(--radius);padding:12px 16px;font-size:0.8rem;color:#ffb300;margin-top:12px}
    .session-preview{background:var(--navy-mid);border:1px solid rgba(79,195,247,0.15);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px}
  </style>
</head>
<body>
<header id="site-header">
  <a class="logo-link" href="/"><div class="logo-mark" id="site-logo-mark">M@SA</div>
    <div class="logo-text"><span class="logo-main">M@SA</span><span class="logo-sub">Messelaar @ STEM Academy NPC</span></div>
  </a>
  <div class="header-spacer"></div>
  <a href="/sessions.html" class="btn btn-ghost btn-sm">← Sessions</a>
</header>

<div class="reg-wrap">
  <div id="loading-state" class="loading-state" style="padding:60px"><div class="spinner"></div></div>
  <div id="reg-content" style="display:none"></div>
  <div id="success-content" style="display:none"></div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
'use strict';
var sessionId = new URLSearchParams(window.location.search).get('id');
var sessionData = null;

document.addEventListener('DOMContentLoaded', async function() {
  await loadSiteLogo();
  if (!sessionId) { window.location.href = '/sessions.html'; return; }
  try {
    sessionData = await apiFetch('/api/sessions/' + sessionId);
    renderRegistrationForm();
  } catch(e) {
    document.getElementById('loading-state').innerHTML = '<p style="color:var(--error)">' + escHtml(e.message) + '</p>';
  }
});

function renderRegistrationForm() {
  document.getElementById('loading-state').style.display = 'none';
  var s = sessionData;
  var start = new Date(s.scheduled_start);

  if (!s.registration_open) {
    document.getElementById('reg-content').style.display = 'block';
    document.getElementById('reg-content').innerHTML =
      '<div style="text-align:center;padding:40px">'
      +'<div style="font-size:3rem;margin-bottom:16px">⏰</div>'
      +'<h2>Registration Closed</h2>'
      +'<p style="color:var(--grey-light)">The registration deadline for this session has passed.</p>'
      +'<a href="/sessions.html" class="btn btn-ghost" style="margin-top:16px">View Other Sessions</a>'
      +'</div>';
    return;
  }

  var isPaid = s.access_type === 'paid';
  var deadlineHours = (s.max_participants||100) > 20 ? 48 : 24;
  var deadline = new Date(new Date(s.scheduled_start).getTime() - deadlineHours * 3600000);

  document.getElementById('reg-content').style.display = 'block';
  document.getElementById('reg-content').innerHTML =
    '<div class="section-label">Registration</div>'
    +'<h1 style="font-size:1.4rem;margin-bottom:20px">'+escHtml(s.title)+'</h1>'

    +'<div class="session-preview">'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">'
    +'<span class="badge badge-'+(isPaid?'gold':'green')+'">'+(isPaid?'Paid — R'+parseFloat(s.price_rands||0).toFixed(2):'Free')+'</span>'
    +'<span class="badge badge-grey">'+escHtml(s.session_type)+'</span>'
    +'</div>'
    +'<div style="font-size:0.82rem;color:var(--white-dim)">📅 '+start.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div>'
    +'<div style="font-size:0.82rem;color:var(--white-dim);margin-top:4px">🕐 '+start.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})+'</div>'
    +'<div style="font-size:0.78rem;color:var(--grey-mid);margin-top:8px">⚠️ Registration closes: '+deadline.toLocaleDateString('en-ZA',{day:'numeric',month:'short'})+' at '+deadline.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})+'</div>'
    +(s.spots_left <= 5 ? '<div style="color:var(--error);font-size:0.78rem;margin-top:4px">⚠️ Only '+s.spots_left+' spots left!</div>' : '')
    +'</div>'

    +'<div class="card" style="padding:24px">'
    +'<h3 style="font-size:0.9rem;margin-bottom:16px;color:var(--light-blue)">Your Details</h3>'
    +'<div class="form-group"><label>Full Name *</label><input type="text" id="reg-name" placeholder="As per your ID document"></div>'
    +'<div class="form-group"><label>ID Number *</label><input type="text" id="reg-id" placeholder="South African ID number" maxlength="13"></div>'
    +'<div class="form-group"><label>Email Address</label><input type="email" id="reg-email" placeholder="Optional — for confirmation"></div>'
    +(isPaid
      ? '<div class="warning-box">💳 This is a paid session (R'+parseFloat(s.price_rands||0).toFixed(2)+'). After registering you will receive your Class ID and EFT payment details. Your spot is only confirmed once payment is verified by admin.</div>'
      : '<div style="background:rgba(76,175,80,0.08);border:1px solid rgba(76,175,80,0.2);border-radius:var(--radius);padding:10px 12px;font-size:0.8rem;color:#81c784;margin-bottom:12px">✓ Free session — you will receive your Class ID immediately.</div>')
    +'<div style="font-size:0.73rem;color:var(--grey-mid);margin-bottom:16px">Your personal information is used only for this session and is deleted from our records after the session ends.</div>'
    +'<button class="btn btn-primary btn-full" onclick="submitRegistration()">Register Now →</button>'
    +'</div>';
}

async function submitRegistration() {
  var name  = document.getElementById('reg-name').value.trim();
  var idNum = document.getElementById('reg-id').value.trim();
  var email = document.getElementById('reg-email').value.trim();

  if (!name || !idNum) { showToast('Full name and ID number are required.', 'error'); return; }
  if (idNum.length < 6) { showToast('Please enter a valid ID number.', 'error'); return; }

  var btn = document.querySelector('#reg-content .btn-primary');
  btn.textContent = 'Registering...'; btn.disabled = true;

  try {
    var result = await apiFetch('/api/sessions/' + sessionId + '/register', {
      method: 'POST', body: { full_name: name, id_number: idNum, email: email||undefined }
    });
    showSuccessScreen(result);
  } catch(e) {
    showToast(e.message, 'error');
    btn.textContent = 'Register Now →'; btn.disabled = false;
  }
}

function showSuccessScreen(result) {
  document.getElementById('reg-content').style.display = 'none';
  document.getElementById('success-content').style.display = 'block';

  var pi = result.payment_instructions;
  var isPaid = result.payment_status === 'pending';
  var start  = new Date(result.scheduled_start);

  var html =
    '<div class="success-box">'
    +'<div style="font-size:2.5rem;margin-bottom:12px">✅</div>'
    +'<h2 style="color:#81c784;margin-bottom:8px">Registration Successful!</h2>'
    +'<p style="color:var(--white-dim);font-size:0.85rem">'+escHtml(result.session_title)+'<br>'
    +start.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'})
    +' at '+start.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})+'</p>'
    +'</div>'

    +'<div style="text-align:center;margin:28px 0 8px">'
    +'<div style="font-size:0.75rem;color:var(--grey-light);margin-bottom:6px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em">Your Class ID</div>'
    +'<div class="class-id-display">'+escHtml(result.class_id)+'</div>'
    +'<p style="font-size:0.78rem;color:var(--grey-light)">⚠️ Screenshot or write this down. You will need it to enter the session.'+(isPaid?' It is also your payment reference.':'')+'</p>'
    +'</div>';

  if (isPaid && pi) {
    html +=
      '<div class="payment-box">'
      +'<div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--light-blue);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px">EFT Payment Details</div>'
      +'<div class="payment-row"><span class="payment-label">Bank</span><span class="payment-value">'+escHtml(pi.bank_name||'—')+'</span></div>'
      +'<div class="payment-row"><span class="payment-label">Account Name</span><span class="payment-value">'+escHtml(pi.account_name||'—')+'</span></div>'
      +'<div class="payment-row"><span class="payment-label">Account Number</span><span class="payment-value">'+escHtml(pi.account_no||'—')+'</span></div>'
      +'<div class="payment-row"><span class="payment-label">Branch Code</span><span class="payment-value">'+escHtml(pi.branch_code||'—')+'</span></div>'
      +'<div class="payment-row"><span class="payment-label">Amount</span><span class="payment-value">R '+parseFloat(pi.amount||0).toFixed(2)+'</span></div>'
      +'<div class="payment-row"><span class="payment-label">Reference</span><span class="payment-value ref-highlight">'+escHtml(pi.reference)+'</span></div>'
      +'<div class="warning-box" style="margin-top:12px">⏰ Payment due '+pi.deadline_hours+' hours before the session. Use the exact reference shown above. Once payment is verified by admin, your Class ID will be activated.</div>'
      +'</div>';
  }

  html += '<div style="text-align:center;margin-top:24px">'
    +'<a href="/sessions.html" class="btn btn-ghost">Back to Sessions</a>'
    +'</div>';

  document.getElementById('success-content').innerHTML = html;
}
</script>
</body>
</html>
