<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications — M@SA</title>
  <link rel="manifest" href="/assets/manifest.json">
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css">
</head>
<body>
<header id="site-header">
  <a class="logo-link" href="/"><div class="logo-mark" id="site-logo-mark">M@SA</div>
    <div class="logo-text"><span class="logo-main">M@SA</span><span class="logo-sub">Messelaar @ STEM Academy NPC</span></div>
  </a>
  <div class="header-spacer"></div>
  <button class="admin-login-btn" onclick="window.location.href='/admin.html'">Admin</button>
  <div style="position:relative">
    <button class="hamburger" id="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
    <nav class="nav-dropdown" id="navMenu">
      <a href="/">🏠 Home</a><a href="/about.html">ℹ️ About</a>
      <a href="/programs.html">🚀 Programs</a><a href="/events.html">📅 Events</a><a href="/sessions.html">📡 Sessions</a>
    </nav>
  </div>
</header>

<div class="page-wrap">
  <div class="section-label">Research &amp; Media</div>
  <h1 style="font-size:1.8rem;margin-bottom:8px">Publications</h1>
  <p style="color:var(--grey-light);margin-bottom:32px">Reports, research papers, newsletters and guides published by Messelaar @ STEM Academy NPC.</p>

  <div id="publications-container">
    <div class="loading-state"><div class="spinner"></div></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
const typeIcon = { report:'📋', newsletter:'📰', research:'🔬', guide:'📘', other:'📄' };

document.addEventListener('DOMContentLoaded', async () => {
  await loadSiteLogo();
  try {
    const pubs = await apiFetch('/api/publications');
    const c    = document.getElementById('publications-container');
    if (!pubs.length) { c.innerHTML = '<p style="color:var(--grey-light)">No publications yet.</p>'; return; }
    c.innerHTML = '<div style="display:flex;flex-direction:column;gap:14px">' +
      pubs.map(p => {
        const icon = typeIcon[p.pub_type] || '📄';
        const link = p.file_path
          ? '<a href="' + escHtml(p.file_path) + '" target="_blank" class="btn btn-primary btn-sm">Download PDF</a>'
          : p.external_url
            ? '<a href="' + escHtml(p.external_url) + '" target="_blank" class="btn btn-primary btn-sm">View →</a>'
            : '';
        return '<div class="pub-card">' +
          '<div class="pub-type-bar"></div>' +
          '<div class="pub-body">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
              '<span style="font-size:1.5rem">' + icon + '</span>' +
              '<span class="badge badge-grey">' + escHtml((p.pub_type||'').toUpperCase()) + '</span>' +
              (p.published_date ? '<span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--grey-light)">' + formatDate(p.published_date) + '</span>' : '') +
            '</div>' +
            '<h4>' + escHtml(p.title) + '</h4>' +
            '<p>' + escHtml(p.description || '') + '</p>' +
            (link ? '<div style="margin-top:12px">' + link + '</div>' : '') +
          '</div>' +
        '</div>';
      }).join('') + '</div>';
  } catch (err) {
    document.getElementById('publications-container').innerHTML = '<p style="color:var(--error)">' + escHtml(err.message) + '</p>';
  }
});
</script>
</body>
</html>
