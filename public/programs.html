<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programs — M@SA</title>
  <link rel="manifest" href="/assets/manifest.json">
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css">
</head>
<body>
<header id="site-header">
  <a class="logo-link" href="/"><div class="logo-mark" id="site-logo-mark">M@SA</div>
    <div class="logo-text"><span class="logo-main">M@SA</span><span class="logo-sub">Messelaar @ STEM Academy NPC</span></div>
  </a>
  <div class="header-spacer"></div>
  <button class="admin-login-btn" onclick="window.location.href='/admin.html'">Admin</button>
  <div style="position:relative">
    <button class="hamburger" id="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
    <nav class="nav-dropdown" id="navMenu">
      <a href="/">🏠 Home</a><a href="/about.html">ℹ️ About</a>
      <a href="/events.html">📅 Events</a><a href="/sessions.html">📡 Sessions</a><a href="/publications.html">📄 Publications</a>
    </nav>
  </div>
</header>

<div class="page-wrap">
  <div class="section-label">What We Do</div>
  <h1 style="font-size:1.8rem;margin-bottom:8px">Programs &amp; Projects</h1>
  <p style="color:var(--grey-light);margin-bottom:32px">All current and recent initiatives run by Messelaar @ STEM Academy NPC.</p>

  <div class="grid-2" id="programs-container">
    <div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadSiteLogo();
  try {
    const programs = await apiFetch('/api/programs');
    const c = document.getElementById('programs-container');
    if (!programs.length) { c.innerHTML = '<p style="color:var(--grey-light);grid-column:1/-1">No programs listed yet.</p>'; return; }
    c.innerHTML = programs.map(p =>
      '<div class="event-card">' +
        '<div class="event-date-bar">' +
          '<div class="event-date-num" style="font-size:2rem">' + escHtml(p.icon || '📌') + '</div>' +
          '<div class="event-date-info">' + escHtml(p.status ? p.status.toUpperCase() : 'PROGRAMME') + (p.start_date ? '<br>' + formatDate(p.start_date) : '') + '</div>' +
        '</div>' +
        '<div class="event-body">' +
          '<h4>' + escHtml(p.title) + '</h4>' +
          '<p>' + escHtml(p.description || '') + '</p>' +
          '<span class="badge badge-' + (p.status==='ongoing'?'green':p.status==='completed'?'grey':'blue') + '" style="margin-top:10px">' + escHtml((p.status||'').toUpperCase()) + '</span>' +
          (p.is_featured ? ' <span class="badge badge-gold">FEATURED</span>' : '') +
        '</div>' +
      '</div>'
    ).join('');
  } catch (err) {
    document.getElementById('programs-container').innerHTML = '<p style="color:var(--error);grid-column:1/-1">' + escHtml(err.message) + '</p>';
  }
});
</script>
</body>
</html>
