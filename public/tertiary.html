<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tertiary Student — M@SA</title>
  <link rel="manifest" href="/assets/manifest.json">
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css">
</head>
<body>
<header id="site-header">
  <a class="logo-link" href="/"><div class="logo-mark" id="site-logo-mark">M@SA</div>
    <div class="logo-text"><span class="logo-main">M@SA</span><span class="logo-sub">Messelaar @ STEM Academy NPC</span></div>
  </a>
  <div class="header-spacer"></div>
  <button class="admin-login-btn" onclick="window.location.href='/admin.html'">Admin</button>
  <div style="position:relative">
    <button class="hamburger" id="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
    <nav class="nav-dropdown" id="navMenu">
      <a href="/">🏠 Home</a><a href="/about.html">ℹ️ About</a>
      <a href="/programs.html">🚀 Programs</a><a href="/events.html">📅 Events</a><a href="/sessions.html">📡 Sessions</a>
      <a href="/publications.html">📄 Publications</a>
    </nav>
  </div>
</header>

<div class="page-wrap">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="section-label">Education Path</div>
  <h1 style="font-size:1.8rem;margin-bottom:8px">Tertiary Student</h1>
  <p style="color:var(--grey-light);margin-bottom:8px">Select your faculty to browse available modules.</p>
  <p style="color:var(--grey-mid);font-size:0.8rem;margin-bottom:32px">Modules shared across faculties link to the same page — no duplicate content.</p>

  <div id="faculties-container" class="grid-3">
    <div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div></div>
  </div>

  <div id="faculty-subjects" style="display:none;margin-top:40px">
    <h2 id="faculty-title" style="font-size:1.2rem;margin-bottom:20px"></h2>
    <div id="subjects-list" class="grid-3"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
let selectedFaculty = null;

document.addEventListener('DOMContentLoaded', async () => {
  await loadSiteLogo();
  await loadFaculties();
});

async function loadFaculties() {
  try {
    const faculties = await apiFetch('/api/faculties');
    const container = document.getElementById('faculties-container');
    container.innerHTML = faculties.map(f => `
      <div class="faculty-card" onclick="selectFaculty('${escHtml(f.slug)}', '${escHtml(f.name)}', '${escHtml(f.icon || '')}')">
        <div class="faculty-icon">${escHtml(f.icon || '🎓')}</div>
        <h3>${escHtml(f.name)}</h3>
        <p>${escHtml(f.description || '')}</p>
        <div class="faculty-count">${f.subject_count || 0} module${f.subject_count !== 1 ? 's' : ''} available</div>
      </div>`).join('');
  } catch (err) {
    document.getElementById('faculties-container').innerHTML =
      `<p style="color:var(--error);grid-column:1/-1">Failed to load faculties: ${escHtml(err.message)}</p>`;
  }
}

async function selectFaculty(slug, name, icon) {
  selectedFaculty = slug;
  document.getElementById('faculty-title').textContent = `${icon} ${name} — Modules`;
  const list = document.getElementById('subjects-list');
  const section = document.getElementById('faculty-subjects');
  section.style.display = 'block';
  list.innerHTML = '<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div></div>';
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    const subjects = await apiFetch(`/api/faculties/${encodeURIComponent(slug)}/subjects`);
    if (!subjects.length) {
      list.innerHTML = '<p style="color:var(--grey-light)">No modules available yet for this faculty.</p>';
      return;
    }
    list.innerHTML = subjects.map(s => `
      <a class="faculty-card" href="/subject.html?id=${encodeURIComponent(s.id)}" style="text-decoration:none">
        <div class="faculty-icon">${escHtml(s.icon || '📖')}</div>
        <h3>${escHtml(s.name)}</h3>
        <p>${escHtml(s.description || '')}</p>
        <div class="faculty-count">${s.topic_count || 0} topics</div>
      </a>`).join('');
  } catch (err) {
    list.innerHTML = `<p style="color:var(--error);grid-column:1/-1">Failed to load modules: ${escHtml(err.message)}</p>`;
  }
}
</script>
</body>
</html>
