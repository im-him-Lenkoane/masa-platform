# MASA Platform — Nginx reverse proxy config
# Place this file at /etc/nginx/sites-available/masa and symlink to sites-enabled

upstream masa_main   { server 127.0.0.1:5000; }
upstream masa_admin  { server 127.0.0.1:5001; }
upstream masa_edu    { server 127.0.0.1:5002; }
upstream masa_iis    { server 127.0.0.1:5003; }
upstream masa_health { server 127.0.0.1:5004; }
upstream masa_ba     { server 127.0.0.1:5005; }
upstream masa_stem   { server 127.0.0.1:5006; }
upstream masa_minm   { server 127.0.0.1:5007; }

server {
    listen 80; server_name masa.org.za;
    location / { proxy_pass http://masa_main; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
}
server {
    listen 80; server_name admin.masa.org.za;
    location / { proxy_pass http://masa_admin; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
}
